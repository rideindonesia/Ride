name: Build Android AAB

on:
  push:
    paths:
      - 'twa-android/**'
      - '.github/workflows/build-aab.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Accept Android Licenses & Install SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" || true

      - name: Set Version Numbers
        run: |
          # versionCode = GitHub run number (naik otomatis setiap build)
          # versionName = 1.MAJOR.run_number (mudah dibaca)
          BUILD_NUMBER=${{ github.run_number }}
          BUILD_VERSION="1.0.${{ github.run_number }}"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
          echo "📦 versionCode: $BUILD_NUMBER"
          echo "📦 versionName: $BUILD_VERSION"

      - name: Restore or Generate Keystore
        working-directory: twa-android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "✅ Menggunakan keystore dari GitHub Secret (konsisten)"
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          else
            echo "⚠️  KEYSTORE_BASE64 belum diset — membuat keystore baru (sementara)"
            keytool -genkey -v \
              -keystore keystore.jks \
              -alias ride \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass rideindonesia \
              -keypass rideindonesia \
              -dname "CN=RIDE Indonesia, OU=Mobile, O=RIDE, L=Jakarta, ST=DKI Jakarta, C=ID"
          fi

      - name: Get SHA-256 Fingerprint
        working-directory: twa-android/app
        run: |
          SHA256=$(keytool -list -v \
            -keystore keystore.jks \
            -alias ride \
            -storepass rideindonesia \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256_FINGERPRINT=$SHA256" >> $GITHUB_ENV
          echo "SHA-256: $SHA256"

      - name: Build Release AAB
        working-directory: twa-android
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
        run: gradle bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: RIDE-SuperApp-v${{ env.BUILD_VERSION }}.aab
          path: twa-android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload Keystore (SIMPAN BAIK-BAIK!)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-SIMPAN-INI
          path: twa-android/app/keystore.jks
          retention-days: 90

      - name: Build Summary
        run: |
          echo "## ✅ Build AAB Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **versionCode** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **versionName** | ${{ env.BUILD_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA-256** | \`$SHA256_FINGERPRINT\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download **RIDE-SuperApp-v${{ env.BUILD_VERSION }}.aab** dari tab Artifacts." >> $GITHUB_STEP_SUMMARY
          echo "Download juga **keystore-SIMPAN-INI** — simpan di tempat aman!" >> $GITHUB_STEP_SUMMARY
