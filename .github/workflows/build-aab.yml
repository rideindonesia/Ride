name: Build Android AAB

on:
  push:
    paths:
      - 'twa-android/**'
      - '.github/workflows/build-aab.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Accept Android Licenses & Install SDK Components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Generate Keystore
        working-directory: twa-android/app
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias ride \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass rideindonesia \
            -keypass rideindonesia \
            -dname "CN=RIDE Indonesia, OU=Mobile, O=RIDE, L=Jakarta, ST=DKI Jakarta, C=ID"
          echo "✅ Keystore berhasil dibuat"

      - name: Get SHA-256 Fingerprint
        working-directory: twa-android/app
        run: |
          SHA256=$(keytool -list -v \
            -keystore keystore.jks \
            -alias ride \
            -storepass rideindonesia \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256_FINGERPRINT=$SHA256" >> $GITHUB_ENV
          echo ""
          echo "======================================"
          echo "SHA-256 untuk assetlinks.json:"
          echo "$SHA256"
          echo "======================================"

      - name: Build Release AAB
        working-directory: twa-android
        run: gradle bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: RIDE-SuperApp-v1.0.aab
          path: twa-android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Keystore (SIMPAN BAIK-BAIK!)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-SIMPAN-INI
          path: twa-android/app/keystore.jks
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ Build AAB Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA-256 Fingerprint untuk assetlinks.json:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA256_FINGERPRINT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Salin fingerprint di atas untuk dipasang di server Railway." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download:" >> $GITHUB_STEP_SUMMARY
          echo "- **RIDE-SuperApp-v1.0.aab** — upload ke Google Play Console" >> $GITHUB_STEP_SUMMARY
          echo "- **keystore-SIMPAN-INI** — simpan di tempat aman, jangan sampai hilang!" >> $GITHUB_STEP_SUMMARY
