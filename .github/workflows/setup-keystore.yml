name: Setup Keystore (Jalankan Sekali)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/keystore.jks \
            -alias ride \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass rideindonesia \
            -keypass rideindonesia \
            -dname "CN=RIDE Indonesia, OU=Mobile, O=RIDE, L=Jakarta, ST=DKI Jakarta, C=ID"
          echo "✅ Keystore dibuat"

      - name: Get SHA-256 Fingerprint
        run: |
          SHA256=$(keytool -list -v \
            -keystore /tmp/keystore.jks \
            -alias ride \
            -storepass rideindonesia \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256_FINGERPRINT=$SHA256" >> $GITHUB_ENV
          echo "SHA-256: $SHA256"

      - name: Encode Keystore to Base64
        run: |
          base64 -w 0 /tmp/keystore.jks > /tmp/keystore.b64
          echo "" >> /tmp/keystore.b64
          echo "✅ Keystore encoded, size: $(wc -c < /tmp/keystore.b64) chars"

      - name: Commit Keystore via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(cat /tmp/keystore.b64 | tr -d '\n')
          CONTENT_B64=$(echo -n "$CONTENT" | base64 -w 0)

          # Check if file already exists (need SHA to update)
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: GitHub-Actions" \
            "https://api.github.com/repos/${{ github.repository }}/contents/twa-android/keystore.b64")

          FILE_SHA=$(echo "$EXISTING" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{ 
              try { const j=JSON.parse(d); console.log(j.sha||''); } catch(e){ console.log(''); }
            })
          ")

          # Build request body
          if [ -n "$FILE_SHA" ]; then
            BODY="{\"message\":\"chore: add persistent keystore [skip ci]\",\"content\":\"$CONTENT_B64\",\"sha\":\"$FILE_SHA\"}"
          else
            BODY="{\"message\":\"chore: add persistent keystore [skip ci]\",\"content\":\"$CONTENT_B64\"}"
          fi

          RESP=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: GitHub-Actions" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/twa-android/keystore.b64" \
            -d "$BODY")

          HTTP=$(echo "$RESP" | tail -1)
          echo "API Response: $HTTP"

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ keystore.b64 berhasil disimpan ke repository!"
          else
            echo "❌ Gagal menyimpan: $RESP"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## ✅ Keystore Permanen Berhasil Disimpan!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "File **twa-android/keystore.b64** sudah ada di repo." >> $GITHUB_STEP_SUMMARY
          echo "Semua build berikutnya otomatis pakai keystore yang sama." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA-256 Fingerprint:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA256_FINGERPRINT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
