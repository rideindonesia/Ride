name: Setup Keystore (Jalankan Sekali)

on:
  workflow_dispatch:

jobs:
  generate-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/keystore.jks \
            -alias ride \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass rideindonesia \
            -keypass rideindonesia \
            -dname "CN=RIDE Indonesia, OU=Mobile, O=RIDE, L=Jakarta, ST=DKI Jakarta, C=ID"
          echo "✅ Keystore dibuat"

      - name: Get SHA-256 Fingerprint
        run: |
          SHA256=$(keytool -list -v \
            -keystore /tmp/keystore.jks \
            -alias ride \
            -storepass rideindonesia \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256_FINGERPRINT=$SHA256" >> $GITHUB_ENV
          echo ""
          echo "======================================"
          echo "SHA-256: $SHA256"
          echo "======================================"

      - name: Save Keystore to Repo as Base64
        run: |
          base64 -w 0 /tmp/keystore.jks > twa-android/keystore.b64
          echo "" >> twa-android/keystore.b64
          echo "✅ Keystore tersimpan sebagai twa-android/keystore.b64"

      - name: Commit Keystore to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add twa-android/keystore.b64
          git commit -m "chore: add persistent keystore [skip ci]"
          git push
          echo "✅ Keystore berhasil disimpan ke repository"

      - name: Summary
        run: |
          echo "## ✅ Keystore Berhasil Disimpan!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "File **twa-android/keystore.b64** sudah dicommit ke repo." >> $GITHUB_STEP_SUMMARY
          echo "Semua build berikutnya akan otomatis pakai keystore yang sama." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA-256 Fingerprint (untuk assetlinks.json):" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA256_FINGERPRINT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
