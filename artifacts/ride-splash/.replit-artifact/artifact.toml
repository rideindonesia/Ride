kind = "web"
previewPath = "/"
title = "RIDE Splash Screen"
version = "1.0.0"
id = "artifacts/ride-splash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25109

[services.development]
run = "pnpm --filter @workspace/ride-splash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ride-splash", "run", "build" ]
publicDir = "artifacts/ride-splash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25109"
BASE_PATH = "/"
